<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Discord Clone</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-main: #313338;
            --bg-sidebar: #2b2d31;
            --bg-channels: #1e1f22;
            --text-main: #dbdee1;
            --accent: #5865f2;
            --accent-hover: #4752c4;
            --danger: #f23f42;
            --online: #23a55a;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-main); color: var(--text-main);
            overflow: hidden;
        }

        /* レイアウト構造 */
        .app-container { display: flex; height: 100vh; width: 100vw; }

        /* 左サイドバー (サーバー・チャンネルリスト風) */
        .sidebar {
            width: 260px; background-color: var(--bg-sidebar);
            display: flex; flex-direction: column; flex-shrink: 0;
            border-right: 1px solid #202225;
        }

        @media (max-width: 768px) {
            .sidebar { width: 80px; } /* モバイル時は細く */
            .sidebar-name { display: none; }
        }

        .user-panel {
            padding: 15px; background: var(--bg-channels);
            display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #202225;
        }

        .profile-img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: #555; cursor: pointer; }
        
        .nav-section { flex: 1; overflow-y: auto; padding: 10px; }
        .nav-item {
            padding: 8px 12px; border-radius: 4px; cursor: pointer;
            margin-bottom: 2px; display: flex; align-items: center; gap: 10px;
            transition: background 0.2s;
        }
        .nav-item:hover { background: #3f4147; }
        .nav-item.active { background: #3f4147; color: white; }

        /* メインチャットエリア */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; }

        .chat-header {
            height: 48px; padding: 0 16px; display: flex; align-items: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2); background: var(--bg-main); font-weight: bold;
        }

        .message-list {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
        }

        .message { display: flex; gap: 15px; }
        .msg-body { flex: 1; }
        .msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .msg-name { font-weight: bold; color: white; }
        .msg-time { font-size: 0.75rem; color: #949ba4; }
        .msg-text { line-height: 1.4; white-space: pre-wrap; word-break: break-all; }

        .input-area { padding: 0 20px 20px 20px; background: var(--bg-main); }
        .input-wrapper {
            background: #383a40; border-radius: 8px; padding: 10px;
            display: flex; align-items: center; gap: 10px;
        }
        .chat-input {
            flex: 1; background: transparent; border: none; color: var(--text-main);
            outline: none; font-size: 1rem;
        }

        /* 通話オーバーレイ */
        #call-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 30%;
            background: #000; display: none; z-index: 100;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .video-grid { display: flex; gap: 10px; width: 100%; height: 100%; justify-content: center; padding: 10px; }
        video { height: 100%; border-radius: 8px; background: #222; max-width: 45%; }

        .call-controls {
            position: absolute; bottom: 10px; display: flex; gap: 15px; background: rgba(0,0,0,0.6);
            padding: 10px 20px; border-radius: 30px;
        }
        .ctrl-btn {
            width: 40px; height: 40px; border-radius: 50%; border: none;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
        }
        .btn-hangup { background: var(--danger); color: white; }
        .btn-mute { background: #b5bac1; }

        /* 着信ポップアップ */
        #incoming-modal {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--bg-sidebar); border: 1px solid var(--accent);
            padding: 20px; border-radius: 12px; z-index: 1000; display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center; width: 300px;
        }

        /* 設定モーダル */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-content { background: var(--bg-main); padding: 30px; border-radius: 8px; width: 400px; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="sidebar">
            <div class="user-panel">
                <img id="myIcon" class="profile-img" title="クリックしてプロフィール設定">
                <div class="sidebar-name">
                    <div id="myName" style="font-weight: bold; font-size: 0.9rem;">Loading...</div>
                    <div id="myFullId" style="font-size: 0.7rem; color: #949ba4;">#000000</div>
                </div>
            </div>
            
            <div class="nav-section">
                <div style="font-size: 0.7rem; font-weight: bold; color: #949ba4; margin-bottom: 8px; padding: 0 8px;">テキストチャンネル</div>
                <div class="nav-item active" onclick="switchChat('global', GLOBAL_ROOM_ID)">
                    <span>🌐</span> <span class="sidebar-name">グローバルチャット</span>
                </div>
                
                <div style="font-size: 0.7rem; font-weight: bold; color: #949ba4; margin: 15px 0 8px; padding: 0 8px;">ダイレクトメッセージ</div>
                <div id="friend-list-ui"></div>
                <button onclick="document.getElementById('add-friend-modal').style.display='flex'" style="width:100%; background:transparent; border:1px dashed #4e5058; color:#949ba4; padding:5px; margin-top:5px; cursor:pointer;">+ フレンド追加</button>
            </div>
        </div>

        <div class="main-content">
            <div id="call-overlay">
                <div class="video-grid" id="video-grid"></div>
                <div class="call-controls">
                    <button class="ctrl-btn btn-mute" id="mute-btn" onclick="toggleMute()">🎤</button>
                    <button class="ctrl-btn btn-mute" onclick="startScreenShare()">💻</button>
                    <button class="ctrl-btn btn-hangup" onclick="endCall()">📞</button>
                    <input type="range" min="0" max="1" step="0.1" value="1" onchange="adjustVolume(this.value)" title="音量調節">
                </div>
            </div>

            <div class="chat-header">
                <span id="chat-title"># グローバルチャット</span>
                <div style="margin-left: auto;">
                    <button onclick="sendCallRequest()" style="background:transparent; border:none; color:var(--text-main); font-size:1.2rem; cursor:pointer;">📞</button>
                </div>
            </div>

            <div class="message-list" id="message-list"></div>

            <div class="input-area">
                <div class="input-wrapper">
                    <button onclick="document.getElementById('file-input').click()" style="background:none; border:none; color:#b5bac1; font-size:1.2rem; cursor:pointer;">+</button>
                    <input type="file" id="file-input" class="hidden" onchange="handleFile(this)">
                    <input type="text" id="chat-input" class="chat-input" placeholder="メッセージを送信...">
                </div>
            </div>
        </div>
    </div>

    <div id="incoming-modal">
        <h3 id="caller-name">着信中...</h3>
        <div style="display:flex; gap:10px; justify-content:center; margin-top:20px;">
            <button onclick="acceptCall()" style="background:var(--online); color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">応答</button>
            <button onclick="rejectCall()" style="background:var(--danger); color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">拒否</button>
        </div>
    </div>

    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <h2>プロフィール設定</h2>
            <input type="text" id="name-change" placeholder="表示名">
            <input type="file" id="icon-change" accept="image/*">
            <div style="margin-top:20px; display:flex; gap:10px;">
                <button onclick="saveProfile()" style="background:var(--accent); color:white; border:none; padding:10px; flex:1;">保存</button>
                <button onclick="this.closest('.modal').style.display='none'" style="background:#4e5058; color:white; border:none; padding:10px; flex:1;">キャンセル</button>
            </div>
        </div>
    </div>

    <div id="add-friend-modal" class="modal">
        <div class="modal-content">
            <h2>フレンド申請</h2>
            <input type="text" id="friend-id-input" placeholder="相手の6桁IDを入力">
            <button onclick="sendFriendRequest()" style="background:var(--accent); width:100%; padding:10px; color:white; border:none; margin-top:10px;">申請を送信</button>
            <button onclick="this.closest('.modal').style.display='none'" style="background:none; border:none; color:#949ba4; margin-top:10px; cursor:pointer; width:100%;">閉じる</button>
        </div>
    </div>

    <script>
        const GLOBAL_ROOM_ID = 'global_room_discord_p2p';
        let myId = localStorage.getItem('p2p_myId') || Math.floor(100000 + Math.random() * 900000).toString();
        localStorage.setItem('p2p_myId', myId);

        let myProfile = JSON.parse(localStorage.getItem('p2p_profile')) || { name: 'ゲスト' + myId.slice(0,3), icon: '' };
        let friends = JSON.parse(localStorage.getItem('p2p_friends')) || {};

        const peer = new Peer(myId);
        let activeConns = {};
        let activeCalls = {};
        let myStream = null;
        let currentMode = 'global';
        let currentTarget = GLOBAL_ROOM_ID;
        let globalPeers = [];
        let incomingCallData = null;

        // UI初期化
        document.getElementById('myName').innerText = myProfile.name;
        document.getElementById('myFullId').innerText = '#' + myId;
        if(myProfile.icon) document.getElementById('myIcon').src = myProfile.icon;
        document.getElementById('myIcon').onclick = () => document.getElementById('profile-modal').style.display = 'flex';

        peer.on('open', () => {
            console.log('Connected with ID:', myId);
            updateFriendUI();
            joinGlobal();
            setInterval(joinGlobal, 10000);
        });

        peer.on('connection', conn => {
            setupConn(conn);
        });

        function setupConn(conn) {
            conn.on('open', () => {
                activeConns[conn.peer] = conn;
                conn.send({ type: 'SYNC_PROFILE', profile: myProfile });
            });
            conn.on('data', data => {
                if (data.type === 'SYNC_PROFILE') {
                    if (friends[conn.peer]) {
                        friends[conn.peer].name = data.profile.name;
                        friends[conn.peer].icon = data.profile.icon;
                        saveFriends(); updateFriendUI();
                    }
                    // グローバルチャット用に一時保存
                    activeConns[conn.peer].tempProfile = data.profile;
                } else if (data.type === 'CHAT') {
                    appendMessage(conn.peer, data.message, data.profile);
                } else if (data.type === 'CALL_REQ') {
                    showIncomingCall(conn.peer, data.profile);
                } else if (data.type === 'FRIEND_REQ') {
                    if(confirm(data.profile.name + "からフレンド申請です。承認しますか？")) {
                        friends[conn.peer] = data.profile; saveFriends(); updateFriendUI();
                        conn.send({ type: 'FRIEND_OK', profile: myProfile });
                    }
                } else if (data.type === 'FRIEND_OK') {
                    friends[conn.peer] = data.profile; saveFriends(); updateFriendUI();
                } else if (data.type === 'ROOM_PEERS') {
                    data.peers.forEach(p => { if(p !== myId && !activeConns[p]) connectTo(p); });
                }
            });
            conn.on('close', () => delete activeConns[conn.peer]);
        }

        // --- 通話機能 ---
        async function sendCallRequest() {
            const targets = currentMode === 'global' ? Object.keys(activeConns) : [currentTarget];
            targets.forEach(id => {
                if(activeConns[id]) activeConns[id].send({ type: 'CALL_REQ', profile: myProfile });
            });
            startCallFlow();
        }

        function showIncomingCall(peerId, profile) {
            incomingCallData = { id: peerId, profile: profile };
            document.getElementById('caller-name').innerText = profile.name + " から着信...";
            document.getElementById('incoming-modal').style.display = 'block';
        }

        async function acceptCall() {
            document.getElementById('incoming-modal').style.display = 'none';
            startCallFlow();
        }

        function rejectCall() {
            document.getElementById('incoming-modal').style.display = 'none';
            incomingCallData = null;
        }

        async function startCallFlow() {
            try {
                myStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                document.getElementById('call-overlay').style.display = 'flex';
                // メイン領域を縮小
                document.querySelector('.message-list').style.flex = '0.7';

                peer.on('call', call => {
                    call.answer(myStream);
                    setupCall(call);
                });

                // 自分から全員に発信
                const targets = currentMode === 'global' ? Object.keys(activeConns) : [currentTarget];
                targets.forEach(id => {
                    const call = peer.call(id, myStream);
                    if(call) setupCall(call);
                });
            } catch(e) { alert("マイクが使用できません"); }
        }

        function setupCall(call) {
            activeCalls[call.peer] = call;
            call.on('stream', stream => {
                addVideo(call.peer, stream);
            });
            call.on('close', () => removeVideo(call.peer));
        }

        async function startScreenShare() {
            try {
                const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                const targets = Object.keys(activeConns);
                targets.forEach(id => {
                    const call = peer.call(id, screenStream);
                    setupCall(call);
                });
                addVideo('my-screen', screenStream, true);
            } catch(e) { console.log("Screen share cancelled"); }
        }

        function endCall() {
            if(myStream) myStream.getTracks().forEach(t => t.stop());
            Object.values(activeCalls).forEach(c => c.close());
            document.getElementById('call-overlay').style.display = 'none';
            document.querySelector('.message-list').style.flex = '1';
            document.getElementById('video-grid').innerHTML = '';
        }

        function toggleMute() {
            const audioTrack = myStream.getAudioTracks()[0];
            audioTrack.enabled = !audioTrack.enabled;
            document.getElementById('mute-btn').innerText = audioTrack.enabled ? '🎤' : '🔇';
        }

        function adjustVolume(val) {
            const videos = document.querySelectorAll('video');
            videos.forEach(v => v.volume = val);
        }

        // --- チャット・UI操作 ---
        document.getElementById('chat-input').onkeypress = (e) => {
            if(e.key === 'Enter' && e.target.value) {
                const msg = e.target.value;
                const data = { type: 'CHAT', message: msg, profile: myProfile };
                if(currentMode === 'global') {
                    Object.values(activeConns).forEach(c => c.send(data));
                } else {
                    if(activeConns[currentTarget]) activeConns[currentTarget].send(data);
                }
                appendMessage(myId, msg, myProfile, true);
                e.target.value = '';
            }
        };

        function appendMessage(senderId, text, profile, isMe = false) {
            const list = document.getElementById('message-list');
            const div = document.createElement('div');
            div.className = 'message';
            const icon = profile.icon || 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=';
            
            div.innerHTML = `
                <img src="${icon}" class="profile-img">
                <div class="msg-body">
                    <div class="msg-header">
                        <span class="msg-name">${profile.name}</span>
                        <span class="msg-time">${new Date().toLocaleTimeString()}</span>
                    </div>
                    <div class="msg-text">${text}</div>
                </div>
            `;
            list.appendChild(div);
            list.scrollTop = list.scrollHeight;
        }

        function switchChat(mode, target) {
            currentMode = mode;
            currentTarget = target;
            document.getElementById('chat-title').innerText = mode === 'global' ? '# グローバルチャット' : `@ ${friends[target]?.name}`;
            document.getElementById('message-list').innerHTML = '';
        }

        // --- P2P基盤 ---
        function joinGlobal() {
            if (activeConns[GLOBAL_ROOM_ID]) return;
            const hostPeer = new Peer(GLOBAL_ROOM_ID);
            hostPeer.on('open', () => {
                hostPeer.on('connection', c => {
                    setupConn(c);
                    c.on('open', () => {
                        const peers = Object.keys(activeConns).concat([myId]);
                        c.send({ type: 'ROOM_PEERS', room: GLOBAL_ROOM_ID, peers: peers });
                    });
                });
            });
            hostPeer.on('error', () => connectTo(GLOBAL_ROOM_ID));
        }

        function connectTo(id) {
            if (id === myId || activeConns[id]) return;
            const conn = peer.connect(id);
            setupConn(conn);
        }

        // --- ユーティリティ ---
        function saveProfile() {
            myProfile.name = document.getElementById('name-change').value || myProfile.name;
            const file = document.getElementById('icon-change').files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    myProfile.icon = e.target.result;
                    finishSave();
                };
                reader.readAsDataURL(file);
            } else { finishSave(); }
        }
        function finishSave() {
            localStorage.setItem('p2p_profile', JSON.stringify(myProfile));
            location.reload();
        }

        function updateFriendUI() {
            const list = document.getElementById('friend-list-ui');
            list.innerHTML = '';
            for(let id in friends) {
                const f = friends[id];
                list.innerHTML += `
                    <div class="nav-item" onclick="switchChat('friend', '${id}')">
                        <img src="${f.icon || ''}" class="profile-img" style="width:24px; height:24px;">
                        <span class="sidebar-name">${f.name}</span>
                    </div>
                `;
            }
        }

        function sendFriendRequest() {
            const id = document.getElementById('friend-id-input').value;
            if(!id || id === myId) return;
            const conn = peer.connect(id);
            conn.on('open', () => {
                conn.send({ type: 'FRIEND_REQ', profile: myProfile });
                alert("申請を送りました");
                document.getElementById('add-friend-modal').style.display = 'none';
            });
        }

        function addVideo(id, stream, muted = false) {
            if(document.getElementById('v_'+id)) return;
            const v = document.createElement('video');
            v.id = 'v_'+id;
            v.srcObject = stream;
            v.autoplay = true;
            v.playsInline = true;
            v.muted = muted;
            document.getElementById('video-grid').appendChild(v);
        }
        function removeVideo(id) {
            const v = document.getElementById('v_'+id);
            if(v) v.remove();
        }
        function saveFriends() { localStorage.setItem('p2p_friends', JSON.stringify(friends)); }
    </script>
</body>
</html>
