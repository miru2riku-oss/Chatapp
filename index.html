<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P チャット＆通話アプリ (完全版)</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 900px; margin: 0 auto; padding: 10px; background-color: #f4f4f9; display: flex; flex-wrap: wrap; gap: 20px;}
        .panel { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); flex: 1; min-width: 300px; margin-bottom: 20px;}
        h2 { margin-top: 0; color: #333; font-size: 1.2em; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        .my-id { font-size: 20px; font-weight: bold; color: #0066cc; }
        input[type="text"] { padding: 8px; width: calc(100% - 20px); margin-bottom: 10px; box-sizing: border-box;}
        button { padding: 8px 15px; cursor: pointer; background-color: #0066cc; color: white; border: none; border-radius: 4px; margin-bottom: 5px;}
        button:hover { background-color: #004c99; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        ul { list-style: none; padding: 0; margin: 0;}
        li { padding: 8px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        #chatBox { height: 300px; overflow-y: scroll; border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; background: #fafafa; }
        .msg { margin-bottom: 10px; display: flex; align-items: flex-start; gap: 10px; }
        .msg.me { flex-direction: row-reverse; }
        .msg-icon { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; background-color: #ddd; }
        .msg-content { max-width: 70%; background: #e9ecef; padding: 8px; border-radius: 8px; word-break: break-all; }
        .msg.me .msg-content { background: #d1e7dd; }
        .msg-sender { font-size: 0.8em; color: #666; margin-bottom: 2px; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-top: 10px; }
        video { width: 100%; background: #000; border-radius: 8px; }
        .profile-img-preview { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #ccc; display: block; margin-bottom: 10px; }
        .status-dot { height: 10px; width: 10px; background-color: #bbb; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .status-dot.online { background-color: #28a745; }
        .global-btn { width: 100%; font-size: 1.1em; padding: 12px; background-color: #28a745; margin-top: 10px;}
        .global-btn:hover { background-color: #218838; }
    </style>
</head>
<body>

    <div style="flex: 1; min-width: 300px;">
        <div class="panel">
            <h2>👤 プロフィール設定</h2>
            <p>ID: <span id="myIdDisplay" class="my-id">読込中...</span></p>
            <img id="myIconPreview" class="profile-img-preview" src="">
            <input type="file" id="iconInput" accept="image/*" onchange="updateProfileIcon()">
            <input type="text" id="myNameInput" placeholder="あなたの表示名" onchange="saveProfileName()">
        </div>

        <div class="panel">
            <h2>🌍 グローバルチャット</h2>
            <p style="font-size: 0.9em; color:#666;">全ユーザーが自動参加している共通ルームです。</p>
            <button class="global-btn" onclick="openChat('global', GLOBAL_ROOM_ID)">🌐 グローバルチャットを開く</button>
        </div>

        <div class="panel">
            <h2>🤝 フレンド</h2>
            <input type="text" id="targetIdInput" placeholder="相手のIDを入力" maxlength="6">
            <button onclick="sendFriendRequest()">申請を送る</button>
            <ul id="friendList"></ul>
        </div>

        <div class="panel">
            <h2>👥 グループ作成</h2>
            <input type="text" id="groupNameInput" placeholder="グループ名">
            <p style="font-size: 0.9em; color:#666;">オンラインのフレンドのみ追加できます</p>
            <ul id="groupMemberSelection"></ul>
            <button onclick="createGroup()">グループを作成</button>
            <hr>
            <h3>あなたのグループ</h3>
            <ul id="groupList"></ul>
        </div>
    </div>

    <div class="panel" id="communicationPanel" style="flex: 2; min-width: 300px; display: none;">
        <h2>💬 <span id="currentChatTitle">チャット</span></h2>
        <p id="chatStatusText" style="font-size: 0.9em; color: #666;"></p>
        
        <div style="margin-bottom: 10px;">
            <button id="btnCall" onclick="startCall(true)">📞 音声通話</button>
            <button id="btnVideo" onclick="startCall(false)">💻 画面共有</button>
            <button onclick="endCall()" style="background-color: #cc0000;">⏹ 終了</button>
        </div>

        <div id="chatBox"></div>
        
        <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 10px;">
            <input type="text" id="chatInput" placeholder="メッセージを入力..." style="flex-grow: 1; margin:0;">
            <button id="btnSendMsg" onclick="sendChatMessage()">送信</button>
        </div>
        
        <div style="display: flex; gap: 10px; align-items: center;">
            <input type="file" id="fileInput">
            <button id="btnSendFile" onclick="sendFile()">ファイル送信</button>
        </div>

        <div id="videoGrid" class="video-grid"></div>
    </div>

    <script>
        // --- 内部IDはエラー回避のため英数字(aaaaa)を使用 ---
        const GLOBAL_ROOM_ID = 'global_room_aaaaa'; 

        // --- データ初期化・ローカルストレージ ---
        let myId = localStorage.getItem('p2p_myId');
        if (!myId) {
            myId = Math.floor(100000 + Math.random() * 900000).toString();
            localStorage.setItem('p2p_myId', myId);
        }
        document.getElementById('myIdDisplay').innerText = myId;

        let myProfile = JSON.parse(localStorage.getItem('p2p_profile')) || { name: '名無し', icon: '' };
        document.getElementById('myNameInput').value = myProfile.name;
        if (myProfile.icon) document.getElementById('myIconPreview').src = myProfile.icon;

        let friends = JSON.parse(localStorage.getItem('p2p_friends')) || {};
        let groups = JSON.parse(localStorage.getItem('p2p_groups')) || {};
        
        // --- 状態管理 ---
        const peer = new Peer(myId);
        let activeConnections = {};
        let activeCalls = {};
        let myStream = null;
        
        let currentMode = null;
        let currentTarget = null;
        let targetPeers = [];

        // グローバルチャット用変数
        let globalRoomPeers = [];
        let isGlobalHost = false;
        let globalHostPeer = null;

        // --- プロフィール設定 ---
        function updateProfileIcon() {
            const file = document.getElementById('iconInput').files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                myProfile.icon = e.target.result;
                document.getElementById('myIconPreview').src = myProfile.icon;
                saveProfileData();
            };
            reader.readAsDataURL(file);
        }
        function saveProfileName() {
            myProfile.name = document.getElementById('myNameInput').value || '名無し';
            saveProfileData();
        }
        function saveProfileData() { localStorage.setItem('p2p_profile', JSON.stringify(myProfile)); }
        function saveFriends() { localStorage.setItem('p2p_friends', JSON.stringify(friends)); }
        function saveGroups() { localStorage.setItem('p2p_groups', JSON.stringify(groups)); }

        // --- PeerJS イベント ---
        peer.on('open', id => {
            console.log('PeerJS 接続成功:', id);
            updateFriendUI();
            updateGroupUI();
            
            // 起動時に自動でグローバルチャットネットワークに参加
            maintainGlobalChat();
            setInterval(maintainGlobalChat, 10000);
            setInterval(checkOnlineStatus, 5000);
        });

        // エラーハンドリング（ボタンが押せなくなるのを防ぐ）
        peer.on('error', err => {
            console.warn('PeerJS Error:', err);
            updateChatUIState();
        });

        peer.on('connection', conn => { setupConnection(conn); });

        function setupConnection(conn) {
            conn.on('open', () => {
                activeConnections[conn.peer] = conn;
                conn.send({ type: 'PROFILE', profile: myProfile });
                
                // 自分がホストなら、参加者リストを配る
                if (isGlobalHost && conn.peer !== GLOBAL_ROOM_ID) {
                    const peers = Object.keys(activeConnections).filter(id => id !== GLOBAL_ROOM_ID);
                    peers.push(myId);
                    conn.send({ type: 'ROOM_PEERS', room: GLOBAL_ROOM_ID, peers: peers });
                }
                updateChatUIState();
            });

            conn.on('data', data => { handleIncomingData(conn.peer, data); });

            conn.on('close', () => {
                delete activeConnections[conn.peer];
                if (globalRoomPeers.includes(conn.peer)) {
                    globalRoomPeers = globalRoomPeers.filter(id => id !== conn.peer);
                }
                updateChatUIState();
            });
            conn.on('error', () => {
                delete activeConnections[conn.peer];
                updateChatUIState();
            });
        }

        function handleIncomingData(peerId, data) {
            if (data.type === 'PROFILE') {
                if (friends[peerId]) {
                    friends[peerId].name = data.profile.name;
                    friends[peerId].icon = data.profile.icon;
                    saveFriends();
                    updateFriendUI();
                }
            } else if (data.type === 'FRIEND_REQUEST') {
                if (confirm(`${data.profile.name} (ID: ${peerId}) からフレンド申請です。承認しますか？`)) {
                    friends[peerId] = data.profile;
                    saveFriends();
                    updateFriendUI();
                    const conn = connectToPeer(peerId);
                    setTimeout(() => conn.send({ type: 'FRIEND_ACCEPT', profile: myProfile }), 1000);
                }
            } else if (data.type === 'FRIEND_ACCEPT') {
                friends[peerId] = data.profile;
                saveFriends();
                updateFriendUI();
                alert(`${data.profile.name} とフレンドになりました！`);
            } else if (data.type === 'CHAT') {
                if (targetPeers.includes(peerId) || (currentMode === 'global' && (globalRoomPeers.includes(peerId) || peerId === GLOBAL_ROOM_ID))) {
                    displayMessage(peerId, data.message, false);
                }
            } else if (data.type === 'FILE') {
                if (targetPeers.includes(peerId) || (currentMode === 'global' && (globalRoomPeers.includes(peerId) || peerId === GLOBAL_ROOM_ID))) {
                    receiveFile(peerId, data.file, data.filename, data.filetype);
                }
            } else if (data.type === 'GROUP_INVITE') {
                if (confirm(`グループ「${data.groupName}」に招待されました。参加しますか？`)) {
                    groups[data.groupId] = { name: data.groupName, members: data.members };
                    saveGroups();
                    updateGroupUI();
                }
            } else if (data.type === 'ROOM_PEERS') {
                if (data.room === GLOBAL_ROOM_ID) {
                    data.peers.forEach(p => {
                        if (p !== myId && !activeConnections[p]) connectToPeer(p);
                        if (!globalRoomPeers.includes(p) && p !== myId) globalRoomPeers.push(p);
                    });
                    if (currentMode === 'global') {
                        targetPeers = [GLOBAL_ROOM_ID, ...globalRoomPeers].filter(id => id !== myId);
                        updateChatUIState();
                    }
                }
            }
        }

        // --- 強制参加グローバルチャットの維持 ---
        function maintainGlobalChat() {
            if (activeConnections[GLOBAL_ROOM_ID] && activeConnections[GLOBAL_ROOM_ID].open) return;
            if (isGlobalHost) return;

            if (!globalHostPeer) {
                globalHostPeer = new Peer(GLOBAL_ROOM_ID);
                globalHostPeer.on('open', () => {
                    isGlobalHost = true;
                    console.log('あなたがグローバルチャットのホスト(親)になりました');
                    globalHostPeer.on('connection', conn => {
                        setupConnection(conn);
                    });
                });
                globalHostPeer.on('error', err => {
                    if (err.type === 'unavailable-id') {
                        isGlobalHost = false;
                        globalHostPeer.destroy();
                        globalHostPeer = null;
                        connectToPeer(GLOBAL_ROOM_ID);
                    }
                });
            } else if (!isGlobalHost) {
                connectToPeer(GLOBAL_ROOM_ID);
            }
        }

        // --- 着信処理 ---
        peer.on('call', call => {
            if (targetPeers.includes(call.peer) || globalRoomPeers.includes(call.peer) || call.peer === GLOBAL_ROOM_ID) {
                answerCall(call);
            } else {
                if(confirm(`${friends[call.peer]?.name || call.peer} から着信です。応答しますか？`)) {
                    answerCall(call);
                }
            }
        });

        function answerCall(call) {
            call.answer(myStream);
            call.on('stream', remoteStream => { addVideoStream(call.peer, remoteStream); });
            activeCalls[call.peer] = call;
            call.on('close', () => removeVideoStream(call.peer));
        }

        function connectToPeer(id) {
            if (activeConnections[id] && activeConnections[id].open) return activeConnections[id];
            const conn = peer.connect(id);
            setupConnection(conn);
            return conn;
        }

        function broadcastToTargets(data) {
            targetPeers.forEach(id => {
                if (activeConnections[id] && activeConnections[id].open) {
                    activeConnections[id].send(data);
                }
            });
        }

        // --- フレンド・グループUI更新 ---
        function sendFriendRequest() {
            const id = document.getElementById('targetIdInput').value;
            if (!id || id === myId) return;
            const conn = connectToPeer(id);
            setTimeout(() => {
                if (conn.open) {
                    conn.send({ type: 'FRIEND_REQUEST', profile: myProfile });
                    alert('申請を送信しました');
                } else {
                    alert('相手がオフラインのようです');
                }
            }, 1500);
        }

        function updateFriendUI() {
            const list = document.getElementById('friendList');
            const groupSelect = document.getElementById('groupMemberSelection');
            list.innerHTML = ''; groupSelect.innerHTML = '';
            for (let id in friends) {
                const f = friends[id];
                const isOnline = activeConnections[id] && activeConnections[id].open;
                list.innerHTML += `
                    <li>
                        <div style="display:flex; align-items:center;">
                            <span class="status-dot ${isOnline ? 'online' : ''}"></span>
                            <img src="${f.icon || 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs='}" class="msg-icon" style="margin-right:5px;">
                            ${f.name} <span style="font-size:0.7em; color:#999;">(${id})</span>
                        </div>
                        <button onclick="openChat('friend', '${id}')">チャット</button>
                        <button onclick="deleteFriend('${id}')" style="background:#dc3545; padding:4px 8px; font-size:0.8em;">削除</button>
                    </li>`;
                groupSelect.innerHTML += `<li><label><input type="checkbox" value="${id}" class="group-cb"> ${f.name} ${isOnline ? '(オンライン)' : '(オフライン)'}</label></li>`;
            }
        }

        function deleteFriend(id) {
            if(confirm('削除しますか？')) { delete friends[id]; saveFriends(); updateFriendUI(); }
        }

        function checkOnlineStatus() {
            for (let id in friends) {
                if (!activeConnections[id] || !activeConnections[id].open) connectToPeer(id);
            }
            setTimeout(() => { updateFriendUI(); updateChatUIState(); }, 2000);
        }

        function createGroup() {
            const name = document.getElementById('groupNameInput').value;
            if(!name) return alert('グループ名を入力してください');
            const members = Array.from(document.querySelectorAll('.group-cb:checked')).map(cb => cb.value);
            const offlineMembers = members.filter(id => !activeConnections[id] || !activeConnections[id].open);
            if (offlineMembers.length > 0) return alert('オンラインのフレンドのみグループに追加できます。');
            members.push(myId);
            const groupId = 'group_' + Date.now();
            groups[groupId] = { name: name, members: members };
            saveGroups(); updateGroupUI();
            members.forEach(id => {
                if (id !== myId) activeConnections[id].send({ type: 'GROUP_INVITE', groupId: groupId, groupName: name, members: members });
            });
            alert('グループを作成しました。');
            document.getElementById('groupNameInput').value = '';
        }

        function updateGroupUI() {
            const list = document.getElementById('groupList');
            list.innerHTML = '';
            for (let gid in groups) {
                const g = groups[gid];
                list.innerHTML += `
                    <li>
                        <span>${g.name} (${g.members.length}人)</span>
                        <button onclick="openChat('group', '${gid}')">開く</button>
                        <button onclick="deleteGroup('${gid}')" style="background:#dc3545; padding:4px 8px; font-size:0.8em;">削除</button>
                    </li>`;
            }
        }
        function deleteGroup(gid) {
            if(confirm('グループを削除しますか？')) { delete groups[gid]; saveGroups(); updateGroupUI(); }
        }

        // --- チャット・通話 UI ---
        function openChat(mode, target) {
            currentMode = mode;
            currentTarget = target;
            targetPeers = [];
            document.getElementById('chatBox').innerHTML = '';
            document.getElementById('videoGrid').innerHTML = '';
            document.getElementById('communicationPanel').style.display = 'block';

            if (mode === 'friend') {
                targetPeers = [target];
                document.getElementById('currentChatTitle').innerText = friends[target].name;
                connectToPeer(target);
            } else if (mode === 'group') {
                const g = groups[target];
                document.getElementById('currentChatTitle').innerText = g.name;
                targetPeers = g.members.filter(id => id !== myId);
                targetPeers.forEach(id => connectToPeer(id));
            } else if (mode === 'global') {
                document.getElementById('currentChatTitle').innerText = 'グローバルチャット';
                targetPeers = [GLOBAL_ROOM_ID, ...globalRoomPeers].filter(id => id !== myId);
                targetPeers.forEach(id => connectToPeer(id));
            }

            updateChatUIState(); // 即時更新
            setTimeout(updateChatUIState, 1500); // 接続後に再チェック
        }

        function updateChatUIState() {
            if (!currentMode) return;
            const activeCount = targetPeers.filter(id => activeConnections[id] && activeConnections[id].open).length;
            const statusText = document.getElementById('chatStatusText');

            if (currentMode === 'friend') {
                if (activeCount > 0) {
                    statusText.innerText = "🟢 オンライン（通信可能）"; statusText.style.color = "green"; enableControls(true);
                } else {
                    statusText.innerText = "🔴 オフライン"; statusText.style.color = "red"; enableControls(false);
                }
            } else if (currentMode === 'group' || currentMode === 'global') {
                if (activeCount > 0 || isGlobalHost) {
                    // グローバルホスト自身か、誰か繋がっていれば通信可能にする
                    statusText.innerText = `🟢 あなたを含め ${activeCount + 1}人 参加中`; statusText.style.color = "green"; enableControls(true);
                } else {
                    statusText.innerText = "🔴 誰もオンラインではありません"; statusText.style.color = "red"; enableControls(false);
                }
            }
        }

        function enableControls(enable) {
            ['btnCall', 'btnVideo', 'btnSendMsg', 'chatInput', 'fileInput', 'btnSendFile'].forEach(id => {
                const element = document.getElementById(id);
                if(element) element.disabled = !enable;
            });
        }

        // --- メッセージ送信 ---
        function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const msg = input.value;
            if (!msg || targetPeers.length === 0) return;
            broadcastToTargets({ type: 'CHAT', message: msg });
            displayMessage(myId, msg, true);
            input.value = '';
        }

        function sendFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            if (!file) return;
            broadcastToTargets({ type: 'FILE', file: file, filename: file.name, filetype: file.type });
            displayMessage(myId, `ファイル [${file.name}] を送信しました`, true);
            fileInput.value = '';
        }

        function displayMessage(peerId, message, isMe) {
            const box = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = `msg ${isMe ? 'me' : ''}`;
            
            let name = isMe ? myProfile.name : (friends[peerId] ? friends[peerId].name : `ゲスト(${peerId.substring(0,4)}..)`);
            let icon = isMe ? myProfile.icon : (friends[peerId] ? friends[peerId].icon : '');
            if (!icon) icon = 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=';

            div.innerHTML = `<img src="${icon}" class="msg-icon"><div><div class="msg-sender">${name}</div><div class="msg-content">${message}</div></div>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function receiveFile(peerId, fileBlob, filename, filetype) {
            const box = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = 'msg';
            let name = friends[peerId] ? friends[peerId].name : `ゲスト(${peerId.substring(0,4)}..)`;
            let icon = friends[peerId] ? friends[peerId].icon : 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=';
            
            const url = URL.createObjectURL(new Blob([fileBlob]));
            let content = filetype.startsWith('image/') ? `<img src="${url}" style="max-width: 200px; border-radius: 8px;">` : `<a href="${url}" download="${filename}">${filename} をダウンロード</a>`;

            div.innerHTML = `<img src="${icon}" class="msg-icon"><div><div class="msg-sender">${name}</div><div class="msg-content">${content}</div></div>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        // --- 通話・画面共有 ---
        async function startCall(isAudioOnly) {
            try {
                if (isAudioOnly) {
                    myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                } else {
                    myStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                }
                if (!isAudioOnly) addVideoStream('my_screen', myStream, true);

                targetPeers.forEach(id => {
                    if (activeConnections[id] && activeConnections[id].open) {
                        const call = peer.call(id, myStream);
                        activeCalls[id] = call;
                        call.on('stream', remoteStream => { addVideoStream(id, remoteStream); });
                        call.on('close', () => removeVideoStream(id));
                    }
                });
                myStream.getVideoTracks()[0]?.addEventListener('ended', endCall);
            } catch (err) { alert("マイク/画面共有の権限がありません。"); }
        }

        function endCall() {
            if (myStream) { myStream.getTracks().forEach(track => track.stop()); myStream = null; }
            for (let id in activeCalls) { activeCalls[id].close(); }
            activeCalls = {};
            document.getElementById('videoGrid').innerHTML = '';
        }

        function addVideoStream(id, stream, muted = false) {
            if (document.getElementById('video_' + id)) return;
            const video = document.createElement('video');
            video.id = 'video_' + id;
            video.srcObject = stream;
            video.autoplay = true;
            video.playsInline = true;
            if (muted) video.muted = true;
            document.getElementById('videoGrid').appendChild(video);
        }

        function removeVideoStream(id) {
            const video = document.getElementById('video_' + id);
            if (video) video.remove();
        }
    </script>
</body>
</html>
