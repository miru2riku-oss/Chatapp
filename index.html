<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Discord Clone (Firebase版)</title>
    <style>
        /* CSSは前回と全く同じなので省略せずにそのまま使います */
        :root { --bg-dark: #36393f; --bg-darker: #2f3136; --bg-darkest: #202225; --text-main: #dcddde; --text-muted: #72767d; --accent: #5865F2; --online: #3ba55c; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 250px; background-color: var(--bg-darker); display: flex; flex-direction: column; }
        .user-profile { background-color: var(--bg-darkest); padding: 15px; display: flex; align-items: center; gap: 10px; }
        .status-indicator { width: 12px; height: 12px; border-radius: 50%; background-color: var(--online); }
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 15px; border-bottom: 1px solid var(--bg-darkest); font-weight: bold; }
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { display: flex; flex-direction: column; }
        .message-header { display: flex; align-items: baseline; gap: 10px; }
        .message-sender { font-weight: bold; }
        .message-time { font-size: 0.8em; color: var(--text-muted); }
        .chat-input-area { padding: 20px; background-color: var(--bg-dark); }
        .chat-input-wrapper { background-color: #40444b; border-radius: 8px; display: flex; padding: 10px; align-items: center; }
        .chat-input-wrapper input[type="text"] { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 1em; }
        .send-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.2em; padding: 0 10px; }
        .send-btn:hover { color: white; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="user-profile">
            <div class="status-indicator"></div>
            <div>
                <div style="font-weight: bold;">マイアカウント</div>
                <div style="font-size: 0.8em; color: var(--text-muted);">ID: <span id="myUserId">読込中...</span></div>
            </div>
        </div>
        </div>

    <div class="chat-area">
        <div class="chat-header">🌐 グローバルチャットルーム（全ユーザー共通）</div>
        <div class="messages" id="messagesArea">
            </div>
        <div class="chat-input-area">
            <div class="chat-input-wrapper">
                <input type="text" id="messageInput" placeholder="メッセージを送信...">
                <button class="send-btn" id="sendBtn">送信</button>
            </div>
        </div>
    </div>

    <script type="module">
        // 1. Firebaseの機能をインポート
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 2. 【重要】ここにステップ1で取得したあなたの firebaseConfig を貼り付けてください！
        const firebaseConfig = {// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDSrzR3O41SsNfAohQKzlwxc0iCPF5o0Pg",
  authDomain: "chatapp-62d81.firebaseapp.com",
  projectId: "chatapp-62d81",
  storageBucket: "chatapp-62d81.firebasestorage.app",
  messagingSenderId: "308156426883",
  appId: "1:308156426883:web:e50957cbf76b4be42a89b6",
  measurementId: "G-JG5C08XY4X"
        };

        // 3. Firebaseの初期化
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- ユーザーIDの管理（ローカルストレージと連携） ---
        let myUserId = localStorage.getItem('myChatId');
        if (!myUserId) {
            myUserId = Math.floor(100000 + Math.random() * 900000).toString(); // 6桁のID生成
            localStorage.setItem('myChatId', myUserId);
        }
        document.getElementById('myUserId').textContent = myUserId;

        // --- メッセージのリアルタイム受信（これこそがFirebaseの力！） ---
        const messagesArea = document.getElementById('messagesArea');
        const q = query(collection(db, "messages"), orderBy("createdAt", "asc"));

        // onSnapshotを使うと、データベースが更新された瞬間に自動でこの処理が走ります
        onSnapshot(q, (snapshot) => {
            messagesArea.innerHTML = ''; // 一旦クリア
            snapshot.forEach((doc) => {
                const msg = doc.data();
                const div = document.createElement('div');
                div.className = 'message';
                
                // 時間のフォーマット処理
                let timeString = "送信中...";
                if (msg.createdAt) {
                    const date = msg.createdAt.toDate();
                    timeString = date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                }

                const isMe = msg.senderId === myUserId;
                const displayName = isMe ? `あなた (ID: ${msg.senderId})` : `ユーザー (ID: ${msg.senderId})`;

                div.innerHTML = `
                    <div class="message-header">
                        <span class="message-sender" style="color: ${isMe ? 'var(--accent)' : 'white'}">${displayName}</span>
                        <span class="message-time">${timeString}</span>
                    </div>
                    <div>${msg.text}</div>
                `;
                messagesArea.appendChild(div);
            });
            // 一番下までスクロール
            messagesArea.scrollTop = messagesArea.scrollHeight;
        });

        // --- メッセージの送信 ---
        document.getElementById('sendBtn').addEventListener('click', async () => {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            input.value = ''; // 入力欄を空にする

            // Firestoreにデータを追加
            try {
                await addDoc(collection(db, "messages"), {
                    text: text,
                    senderId: myUserId,
                    createdAt: serverTimestamp() // サーバーの正確な時間を記録
                });
            } catch (e) {
                console.error("エラーが発生しました: ", e);
                alert("送信に失敗しました。Firebaseの設定（テストモードになっているか等）を確認してください。");
            }
        });

        // Enterキーで送信
        document.getElementById('messageInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                document.getElementById('sendBtn').click();
            }
        });
    </script>
</body>
</html>
